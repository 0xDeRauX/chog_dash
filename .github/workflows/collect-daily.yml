name: Collect daily data

on:
  schedule:
    - cron: "23 6 * * *" # 06:23 UTC daily (off-the-hour to reduce GitHub's schedule delay)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Collect X mentions
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: npm run collect:mentions

      - name: Collect prices
        run: npm run collect:prices

      - name: Collect chain TVL
        run: npm run collect:tvl

      - name: Ingest into SQLite
        run: npm run ingest

      - name: Build dashboard data
        run: npm run build:dashboard

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw public/data.json
          git diff --cached --quiet || git commit -m "Daily data collection $(date -u +%Y-%m-%d)"
          git push

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
