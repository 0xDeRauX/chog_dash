name: Collect daily data

on:
  schedule:
    - cron: "23 6 * * *" # 06:23 UTC daily (off-the-hour to reduce GitHub's schedule delay)
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Discover chain radar (Monad + Robinhood + Base)
        run: npm run collect:radar

      - name: Collect X mentions
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: npm run collect:mentions

      - name: Collect prices
        run: npm run collect:prices

      - name: Collect chain TVL
        run: npm run collect:tvl

      - name: Collect Discord members
        run: npm run collect:discord

      - name: Collect Telegram members
        run: npm run collect:telegram

      # Persist the on-chain holder balance ledger between runs (outside the
      # repo) so holders update incrementally instead of re-indexing daily.
      - name: Restore holder state
        uses: actions/cache@v4
        with:
          path: |
            data/holders-state
            data/pnl-state
          key: chog-ledger-v2-${{ github.run_id }}
          restore-keys: |
            chog-ledger-v2-

      - name: Collect holders
        env:
          THIRDWEB_SECRET_KEY: ${{ secrets.THIRDWEB_SECRET_KEY }}
          HYPERSYNC_API_KEY: ${{ secrets.HYPERSYNC_API_KEY }}
          TAOSTATS_API_KEY: ${{ secrets.TAOSTATS_API_KEY }}
          blockvision_api_key_sui: ${{ secrets.BLOCKVISION_API_KEY_SUI }}
          blockvision_api_key_monad: ${{ secrets.BLOCKVISION_API_KEY_MONAD }}
        run: npm run collect:holders

      - name: Collect trade flow (buy/sell volume)
        run: npm run collect:tradeflow

      # After prices (cost basis needs the day's price) and holders (shares the
      # cached state directory). Incremental: only new blocks are folded.
      - name: Replay holder PnL ledger (CHOG)
        env:
          THIRDWEB_SECRET_KEY: ${{ secrets.THIRDWEB_SECRET_KEY }}
          HYPERSYNC_API_KEY: ${{ secrets.HYPERSYNC_API_KEY }}
        run: npm run collect:pnl

      - name: Ingest into SQLite
        run: npm run ingest

      - name: Build dashboard data
        run: npm run build:dashboard

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw public/data.json
          git diff --cached --quiet || git commit -m "Daily data collection $(date -u +%Y-%m-%d)"
          git push

      - name: Upload dashboard artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
